name: Docker Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Webhook version to build (e.g. 2.8.2)'
        required: true

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/webhook:latest
            ghcr.io/${{ github.repository_owner }}/webhook:v${{ github.event.inputs.version }}
          build-args: |
            WEBHOOK_VERSION=${{ github.event.inputs.version }}
