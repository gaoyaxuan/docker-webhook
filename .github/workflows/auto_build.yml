name: auto build docker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

permissions:
  contents: write
  packages: write

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compare latest release version
        id: get_release_version
        run: |
          # 获取本仓库最新 release tag（格式: v2.8.2 -> 2.8.2）
          release_version=$(curl -sf "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r '.tag_name // empty' | sed 's/^v//' | xargs)

          # 获取上游仓库最新 release tag（格式: 2.8.2）
          source_release_version=$(curl -sf "https://api.github.com/repos/adnanh/webhook/releases/latest" | jq -r '.tag_name // empty' | xargs)

          if [ -z "$source_release_version" ]; then
            echo "::error::无法获取上游仓库版本"
            exit 1
          fi

          if [ "$release_version" = "$source_release_version" ]; then
            echo "版本相同，无需构建: $source_release_version"
            echo "NEED_BUILD=false" >> "$GITHUB_OUTPUT"
          else
            echo "本仓库: $release_version, 上游仓库: $source_release_version, 需要构建"
            echo "NEED_BUILD=true" >> "$GITHUB_OUTPUT"
          fi

          echo "SOURCE_RELEASE_VERSION=$source_release_version" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=v$source_release_version" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        if: steps.get_release_version.outputs.NEED_BUILD == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        if: steps.get_release_version.outputs.NEED_BUILD == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.get_release_version.outputs.NEED_BUILD == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.get_release_version.outputs.NEED_BUILD == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/webhook:latest
            ghcr.io/${{ github.repository_owner }}/webhook:${{ env.RELEASE_VERSION }}
          build-args: |
            WEBHOOK_VERSION=${{ env.SOURCE_RELEASE_VERSION }}

      - name: Create Release
        if: steps.get_release_version.outputs.NEED_BUILD == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: ${{ env.RELEASE_VERSION }}
          draft: false
          prerelease: false
